<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Krazy Sekwens Brah</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background-color: #0a0a0a; color: white; font-family: ui-sans-serif, system-ui, sans-serif; }
    .grid-cell { transition: all 0.1s; cursor: pointer; }
    .grid-cell.active { background-color: #06b6d4; box-shadow: 0 0 10px #06b6d4; border-color: #06b6d4; }
    .grid-cell.current { border-color: white; border-width: 2px; }
    .bass-cell { transition: all 0.1s; cursor: pointer; }
    .bass-cell.active { background-color: #d946ef; box-shadow: 0 0 10px #d946ef; border-color: #d946ef; }
    .bass-cell.current { border-color: white; border-width: 2px; }
  </style>
</head>
<body class="min-h-screen bg-[#0a0a0a] text-white p-4 md:p-8 font-sans selection:bg-fuchsia-500/30">
  <div id="app" class="max-w-5xl mx-auto w-full bg-[#1A1A1A]/80 backdrop-blur-md rounded-3xl shadow-[0_0_50px_rgba(255,0,255,0.5)] border-4 border-cyan-400 p-6 md:p-8">
    
    <!-- Header & Transport -->
    <div class="flex flex-col md:flex-row items-start justify-between mb-8 gap-6 border-b-4 border-fuchsia-500 pb-6">
      <div class="flex flex-col gap-6 w-full md:w-1/2">
        <div>
          <h1 class="text-5xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-500 mb-1 uppercase italic drop-shadow-[0_0_10px_rgba(255,0,255,0.8)]">
            KRAZY SEKWENS BRAH
          </h1>
          <p class="text-cyan-200 text-sm font-mono uppercase tracking-widest animate-pulse">Analog-Style Step Machine</p>
        </div>
        
        <div id="controls-container" class="hidden bg-[#000]/50 p-4 rounded-2xl border-2 border-cyan-400 shadow-[inset_0_0_20px_rgba(0,255,255,0.2)]">
          <div class="flex flex-col gap-4">
            <div class="flex flex-col gap-1 pb-4 border-b border-cyan-400/30">
              <div class="flex justify-between text-xs font-mono text-cyan-300 uppercase tracking-wider">
                <span>Master BPM</span>
                <span id="bpm-val" class="text-white">120</span>
              </div>
              <input type="range" id="bpm-slider" min="60" max="180" value="120" class="w-full accent-fuchsia-500" />
            </div>
            
            <div>
              <h3 class="text-cyan-300 font-mono text-xs uppercase tracking-widest mb-3">Drum Effects</h3>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="flex flex-col gap-1">
                  <div class="flex justify-between text-xs font-mono text-cyan-300 uppercase tracking-wider">
                    <span>Distortion</span>
                    <span id="dist-val" class="text-white">0.0</span>
                  </div>
                  <input type="range" id="dist-slider" min="0" max="10" step="0.1" value="0" class="w-full accent-fuchsia-500" />
                </div>
                <div class="flex flex-col gap-1">
                  <div class="flex justify-between text-xs font-mono text-cyan-300 uppercase tracking-wider">
                    <span>Saturation</span>
                    <span id="sat-val" class="text-white">0.0</span>
                  </div>
                  <input type="range" id="sat-slider" min="0" max="1" step="0.05" value="0" class="w-full accent-fuchsia-500" />
                </div>
                <div class="flex flex-col gap-1">
                  <div class="flex justify-between text-xs font-mono text-cyan-300 uppercase tracking-wider">
                    <span>Bitcrush</span>
                    <span id="bit-val" class="text-white">0.0</span>
                  </div>
                  <input type="range" id="bit-slider" min="0" max="1" step="0.05" value="0" class="w-full accent-fuchsia-500" />
                </div>
                <div class="flex items-center justify-between text-xs font-mono text-cyan-300 uppercase tracking-wider">
                  <span>Sidechain</span>
                  <button id="sidechain-btn" class="px-3 py-1 rounded-full border-2 transition-all bg-fuchsia-600 border-fuchsia-400 text-white shadow-[0_0_10px_rgba(255,0,255,0.6)]">
                    ON
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <div class="flex items-center justify-center w-full md:w-auto mt-4 md:mt-0 md:ml-auto">
        <button id="start-audio-btn" class="flex items-center gap-2 bg-fuchsia-500 hover:bg-fuchsia-400 text-white px-8 py-4 rounded-full font-bold transition-all justify-center uppercase tracking-widest shadow-[0_0_20px_rgba(255,0,255,0.6)] text-lg">
          <i data-lucide="volume-2"></i> Start Audio
        </button>
        <button id="play-btn" class="hidden flex items-center justify-center w-32 h-32 rounded-full transition-all border-4 shadow-[0_0_30px_rgba(255,255,255,0.3)] bg-cyan-400 border-white text-black hover:bg-white hover:scale-105">
          <i data-lucide="play" class="w-12 h-12 ml-2"></i>
        </button>
      </div>
    </div>

    <!-- Drum Sequencer -->
    <div class="mb-8 overflow-x-auto pb-4">
      <h3 class="text-cyan-300 font-mono text-sm uppercase tracking-widest mb-4">Drum Machine</h3>
      <div id="drum-grid" class="flex flex-col gap-2 min-w-[600px]"></div>
    </div>

    <!-- Vocaloid Lead Synth -->
    <div class="mb-8">
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
        <h3 class="text-cyan-300 font-mono text-sm uppercase tracking-widest">Vocaloid Lead Synth</h3>
        <div class="flex items-center gap-4 w-full md:w-auto">
          <input type="text" id="lyrics-input" value="RO BOT IC FUNK MA CHINE" class="bg-[#000]/50 border-2 border-cyan-400 rounded-full px-4 py-1 text-xs font-mono text-white w-full md:w-64 focus:outline-none focus:border-fuchsia-500 transition-colors" placeholder="Enter lyrics (space separated)" />
          <button id="clear-canvas-btn" class="hover:text-white transition-colors border-2 border-cyan-500 px-3 py-1 rounded-full text-xs font-mono shadow-[0_0_5px_rgba(0,255,255,0.4)] whitespace-nowrap">
            Clear Canvas
          </button>
        </div>
      </div>
      <div class="relative w-full h-48 md:h-64 bg-[#1A1A1A] border-2 border-cyan-400 rounded-2xl overflow-hidden shadow-[inset_0_0_20px_rgba(0,255,255,0.1)]">
        <canvas id="lead-canvas" width="1024" height="256" class="w-full h-full cursor-crosshair touch-none" style="touch-action: none;"></canvas>
        <div id="lead-playhead" class="absolute top-0 bottom-0 w-1 bg-white/50 shadow-[0_0_10px_rgba(255,255,255,0.8)] pointer-events-none hidden"></div>
        <div class="absolute inset-0 pointer-events-none flex" id="lead-markers"></div>
      </div>
      <div class="flex justify-between mt-2 text-xs font-mono text-cyan-300/50">
        <span>Low Pitch</span>
        <span>High Pitch</span>
      </div>
    </div>

    <!-- Acid Bass -->
    <div class="bg-[#000]/50 p-4 md:p-6 rounded-2xl border-2 border-fuchsia-500 mb-6 shadow-[inset_0_0_20px_rgba(255,0,255,0.2)]">
      <h3 class="text-fuchsia-300 font-mono text-sm uppercase tracking-widest mb-4">Acid Bass Controls</h3>
      <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
        <div class="flex flex-col gap-1">
          <div class="flex justify-between text-xs font-mono text-fuchsia-300 uppercase tracking-wider"><span>Cutoff</span><span id="cutoff-val">2000</span></div>
          <input type="range" id="cutoff-slider" min="100" max="5000" value="2000" class="w-full accent-cyan-400" />
        </div>
        <div class="flex flex-col gap-1">
          <div class="flex justify-between text-xs font-mono text-fuchsia-300 uppercase tracking-wider"><span>Resonance</span><span id="res-val">10</span></div>
          <input type="range" id="res-slider" min="0" max="30" step="0.1" value="10" class="w-full accent-cyan-400" />
        </div>
        <div class="flex flex-col gap-1">
          <div class="flex justify-between text-xs font-mono text-fuchsia-300 uppercase tracking-wider"><span>Env Mod</span><span id="env-val">4000</span></div>
          <input type="range" id="env-slider" min="0" max="8000" value="4000" class="w-full accent-cyan-400" />
        </div>
        <div class="flex flex-col gap-1">
          <div class="flex justify-between text-xs font-mono text-fuchsia-300 uppercase tracking-wider"><span>Decay</span><span id="decay-val">0.2</span></div>
          <input type="range" id="decay-slider" min="0.1" max="1" step="0.01" value="0.2" class="w-full accent-cyan-400" />
        </div>
        <div class="flex flex-col gap-1">
          <div class="flex justify-between text-xs font-mono text-fuchsia-300 uppercase tracking-wider"><span>Waveform</span></div>
          <button id="wave-btn" class="bg-[#333] border-2 border-[#555] text-white px-2 py-1 rounded text-xs font-mono hover:border-cyan-400 transition-colors">SAWTOOTH</button>
        </div>
      </div>
      
      <div class="overflow-x-auto pb-2">
        <div id="bass-grid" class="flex gap-1 min-w-[600px]"></div>
      </div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
  <script src="audio.js"></script>
  <script src="app.js"></script>
</body>
</html>
